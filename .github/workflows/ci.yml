name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: SLCD-backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./SLCD-backend
      run: npm ci
    
    - name: Build
      working-directory: ./SLCD-backend
      run: npm run build
    
    - name: Run tests
      working-directory: ./SLCD-backend
      run: npm test
  
  frontend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: daycare-frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./daycare-frontend
      run: npm ci
    
    - name: Build
      working-directory: ./daycare-frontend
      run: npm run build
    
    - name: Run tests
      working-directory: ./daycare-frontend
      run: npm test -- --watchAll=false
